<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无限循环动画</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: #f0f0f0;
  }
  .box {
    width: 100px;
    height: 100px;
    background-color: #4CAF50;
    animation: colorChange 3s infinite alternate;
  }
  @keyframes colorChange {
    0% {
      background-color: #4CAF50;
      transform: scale(1);
    }
    50% {
      background-color: #FFC107;
      transform: scale(1.5);
    }
    100% {
      background-color: #f44336;
      transform: scale(1);
    }
  }
</style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
